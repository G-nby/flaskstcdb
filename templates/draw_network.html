<div id="main" class="m-auto col-md-8" style="width: 1000px;height:390px;"></div>
    <script type="text/javascript">
        var nodelist = JSON.parse('{{ nodelist_json | safe }}');
        var linklist = JSON.parse('{{ linklist_json | safe }}');
        // console.log(nodelist)
        // 基于准备好的dom，初始化echarts实例
        var myChart = echarts.init(document.getElementById('main'));



        // 指定图表的配置项和数据
        option = {
            title: {
                text: 'View In Network',
                subtext: 'network of selected pathways',
                textStyle: {
                        color: '#000',
                        fontSize: 20,
                    },
              },
            tooltip: {
                trigger: 'item',
                formatter: function(x) {
                    return x.data.label; //设置提示框的内容和格式 节点和边都显示name属性
                },
            },
            toolbox: {
                    show: true,
                    feature: {
                        dataView: {show:true},
                        saveAsImage: {
                            //excludeComponents :['toolbox'],
                            pixelRatio: 5
                        }
                    }
                },
            animationDurationUpdate: 1500,
            animationEasingUpdate: 'quinticInOut',
            series: [
                {
                type: 'graph',
                layout: 'force', // 'circular' ,force
                symbolSize: 3, //图形的大小（示例中的圆的大小）
                roam: true, //鼠标缩放及平移
                focusNodeAdjacency: true, //是否在鼠标移到节点上的时候突出显示节点、节点的边和邻接节点


                //力引导布局相关的配置项
                //通过修改layout属性，分别绘制一个力引导图和一个圆形的图。
                // 'circular' ,force
                force: {
                    x: 'center',
                    y: '50px',
                    edgeLength: 170,//线的长度，这个距离也会受 repulsion，支持设置成数组表达边长的范围
                    gravity:0.02,//节点受到的向中心的引力因子。该值越大节点越往中心点靠拢。
                    //repulsion 节点之间的斥力因子，这项可以设置为数组形式，不同大小的值会线性映射到不同的斥力，值越大则斥力越大。
                    //repulsion: 0.02//节点之间的斥力因子。值越大则斥力越大
                    //initLayout：进行力引导布局前的初始化布局，初始化布局会影响到力引导的效果。

                },
                     edgeSymbol: ['circle', 'arrow'],//箭头
                //    edgeSymbolSize: [6, 10],

                data: [], //节点数据

                links: [],//连线数据

                categories: []
                } //节点数据
                ]
            };

        //填充数据
        for (var i = 0; i < nodelist.length; i++) {
            option.series[0].data.push({
                name: nodelist[i],
                label: {
                    show: true,
                    position: '',
                    fontSize: 10,
                    color: 'black',
                },
                draggable: true,
                category: nodelist[i],
                symbolSize: 18,
                itemStyle: {color:'#D3D3D3'}
            });
        }


        var categoryColors = {
            '1.': '#FFD700', // 黄色
            '2.': '#E9967A', // 红色
            '3.': '#6495ED',  // 蓝色
            '4.': '#9ACD32'   // 绿色
            // 可以根据需要定义更多的类别和颜色映射
        };


        // 定义颜色数组
        var linkColors = [];
        // 填充连线数据
        for (var i = 0; i < linklist.length; i++) {
            var category = linklist[i].label.substring(0, 2);
            var color = categoryColors[category];
            linkColors.push(color); // 将颜色存入数组
            option.series[0].links.push({
                source: linklist[i].source,
                target: linklist[i].target,
                value: '',
                label: {
                    show: true,
                    position: 'middle',
                    formatter: linklist[i].label,
                },
                lineStyle: {
                    normal: {
                        show: true,
                        width: linklist[i].width,
                        color: color, // 直接使用颜色变量 //’source‘
                        curveness: 0.2,
                        type: 'solid',
                        opacity: '0.4',
                    },
                },
            });
        }

        // 在 option 中设置 color 属性为颜色数组
        option.series[0].links.color = linkColors;

        // 填充节点类别数据
        for (var i = 0; i < nodelist.length; i++) {
            option.series[0].categories.push({
                name: nodelist[i],
                icon: 'circle',
            });
        }

        // 使用刚指定的配置项和数据显示图表.
        myChart.setOption(option);
    </script>
