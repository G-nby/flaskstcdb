{# 结果表格 #}
<table class="table" style="width: 1000px; margin: 100px auto">

    <tr>
      <th scope="col">st code</th>
      <th scope="col">Stimulator</th>
      <th scope="col">Acceptor</th>
    </tr>
  </thead>
  <tbody>
   {% for resi in res_table %}
    <tr>
      <th><a href="interaction_detail/{{ resi.st_code }}">{{ resi.st_code }}</a></th>
      <td><a href="/entity_detail/{{ resi.Stimulator }}">{{ resi.Stimulator }}</a></td>
